<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Andamios</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      box-sizing: border-box;
    }

    .contenedor {
      text-align: center;
      background: white;
      padding: 40px;
      border-radius: 18px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 700px;
    }

    h1 {
      margin-bottom: 10px;
      color: #1a73e8;
      font-size: 36px;
    }

    .sub {
      margin-bottom: 30px;
      color: #6b7280;
      font-size: 16px;
    }

    .botones {
      display: flex;
      gap: 20px;
      justify-content: center;
    }

    a {
      text-decoration: none;
      flex: 1;
    }

    .btn {
      display: block;
      padding: 18px;
      border-radius: 12px;
      font-weight: bold;
      background: #1a73e8;
      color: white;
      transition: 0.2s;
      font-size: 16px;
    }

    .btn:hover {
      background: #1558b0;
    }

    /* 📱 MODO CELULAR */
    @media (max-width: 768px) {
      .contenedor {
        padding: 25px 20px;
      }

      h1 {
        font-size: 28px;
      }

      .sub {
        font-size: 14px;
      }

      .botones {
        flex-direction: column;
        gap: 14px;
      }

      .btn {
        padding: 14px;
        font-size: 15px;
      }
    }

    /* 📱 CELULARES PEQUEÑOS */
    @media (max-width: 480px) {
      body {
        padding: 10px;
      }

      .contenedor {
        padding: 20px 15px;
      }

      h1 {
        font-size: 24px;
      }

      .btn {
        padding: 12px;
        font-size: 14px;
      }
    }

  </style>
</head>
<body>

  <div class="contenedor">
    <h1>ANDAMIOS</h1>
    <div class="sub">Seleccione una opción</div>

    <div class="botones">
      <a class="btn" href="inventario.html">Inventario</a>
      <a class="btn" href="evaluacion.html">Evaluación de Desempeño</a>
    </div>
  </div>

</body>
</html>
